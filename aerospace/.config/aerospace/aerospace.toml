# AeroSpace, a tiling window manager for macOS.
# https://nikitabobko.github.io/AeroSpace/guide

config-version = 2
start-at-login = true

# 'auto' orients horizontally on wide monitors and vertically on tall ones.
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

persistent-workspaces = [
  '1', '2', '3', '4', '5', '6', '7', '8', '9',
  'A', 'B', 'C', 'D', 'E', 'F', 'G', 'I',
  'M', 'N', 'O', 'P', 'Q', 'R', 'S', 'T',
  'U', 'V', 'W', 'Y', 'Z',
]

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.top = 8
outer.bottom = 8

# ---------------------------------------------------------------------------
# Keybindings, main mode
# ---------------------------------------------------------------------------

[mode.main.binding]

# Direction: alt focuses, alt-shift moves.
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Workspaces: alt switches, alt-shift moves the window.
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Layout & sizing. alt is the soft action, alt-shift the big one.
alt-f = 'fullscreen'
alt-shift-f = 'layout floating tiling'

alt-b = 'balance-sizes'
alt-shift-b = 'flatten-workspace-tree'

alt-r = 'mode resize'

alt-slash = 'layout tiles horizontal vertical'

# Joining: pull a neighbor into the current container.
ctrl-alt-h = 'join-with left'
ctrl-alt-j = 'join-with down'
ctrl-alt-k = 'join-with up'
ctrl-alt-l = 'join-with right'

# ---------------------------------------------------------------------------
# Keybindings, resize mode
# ---------------------------------------------------------------------------

[mode.resize.binding]
h = 'resize width -50'
l = 'resize width +50'
j = 'resize height +50'
k = 'resize height -50'
enter = 'mode main'
esc = 'mode main'
